<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        .card {width: 500px;
            background-color: white;
            margin: 100px auto;
            border-radius: 16px ;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            display: flex;
        }

        img {border-radius: 5px; object-fit: cover; height:180px ; width:180px}

        h2 {font-size: 1.5rem; font-weight: bold ;}

        button {color: white;
            background-color: rgb(0, 87, 200);
            border-radius: 7px;
            border: 5px solid transparent;
            margin: 3px;
            width: 85px;
        }

        button:hover {background-color: darkorchid; 
            color: lightgray}

        .sec1 {padding: 10px; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;}

        .sec2 {padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @media (max-width: 640px) {
            .card {flex-direction: column; width: 70vw}

            img {height: 150px ; width: 150px}
            
            p {text-align:center ;}

            .sec1 {margin: 1%; padding: 1%;}

            .sec2 {align-items: center}
            
            .sec2a {display:block;
                margin: auto;
                width: 90%;
            }

            a {min-width: 100%;}
            button {min-width: 100%;}

        }
        
    </style>
</head>
<body>
    <div class="card">
        <div class="sec1">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQF4tnRWuUJlv4RPqfYMcY-eAU-JpfNMPqfxg&s" alt="profile img" >
            <h2>Rahul Verma</h2>
        </div>
        <div class="sec2">
            <p>Web Designer & JavaScript Enthusiast. Loves clean, creative layouts and good coffee!</p>
            <div class="sec2a">
                <a href="#"><button>Contact</button></a>
                <a href="#"><button>Portfolio</button></a>
            </div>
        </div>
    </div>
</body>
</html>
