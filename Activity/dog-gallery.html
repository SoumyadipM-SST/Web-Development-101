<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dog Gallery</title>
  <style>
    body {margin: 20px; background-color: beige;}

    h1 {text-align: center; margin-bottom: 20px;}

    .gallery {display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;}

    .gallery img {
      width: 100%;
      height: 250px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    .gallery img:hover {border: 3px solid black; box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);}

    @media (max-width: 900px) {.gallery {grid-template-columns: repeat(2, 1fr);}}

    @media (max-width: 600px) {.gallery {grid-template-columns: 1fr;} .gallery img {height: 200px;}}
  </style>
</head>

<body>
  <h1>Dog Gallery</h1>
  <div class="gallery">
    <img src="https://assets-news.housing.com/news/wp-content/uploads/2023/07/06182707/Cute-dog-breeds-that-make-the-best-pets-03.png" alt="Dog 1">
    <img src="https://assets-news.housing.com/news/wp-content/uploads/2023/07/06205822/Cute-dog-breeds-that-make-the-best-pets-f.jpg" alt="Dog 2">
    <img src="https://assets-news.housing.com/news/wp-content/uploads/2023/07/07135237/Cute-dog-breeds-that-make-the-best-pets-05.png" alt="Dog 3">
    <img src="https://assets-news.housing.com/news/wp-content/uploads/2023/07/06233559/Cute-dog-breeds-that-make-the-best-pets-07.png" alt="Dog 4">
    <img src="https://assets-news.housing.com/news/wp-content/uploads/2023/07/07041448/Cute-dog-breeds-that-make-the-best-pets-09.png" alt="Dog 5">
    <img src="https://assets-news.housing.com/news/wp-content/uploads/2023/07/08063135/Cute-dog-breeds-that-make-the-best-pets-04.png" alt="Dog 6">
    <img src="https://assets-news.housing.com/news/wp-content/uploads/2023/07/07211110/Cute-dog-breeds-that-make-the-best-pets-01.png" alt="Dog 7">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTNBXpA3W63Wwseu3hZUU_7OT0fo1ZSav571Q&s" alt="Dog 8">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSy74KE5Ye9iTsNVYSSVt_q9ODGa0AnoL1QRg&s" alt="Dog 9">
  </div>
</body>
</html>
